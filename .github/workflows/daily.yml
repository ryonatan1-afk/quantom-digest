name: Daily Quantum Digest

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC = 07:00 Israel summer (IDT, UTC+3)
  workflow_dispatch:        # Allows manual trigger from GitHub UI for testing

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit items.csv back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run quantum watch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONIOENCODING: utf-8
        run: python quantum_watch.py

      - name: Commit updated items.csv
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add items.csv
          git diff --staged --quiet || git commit -m "chore: update items.csv [skip ci]"
          git push
